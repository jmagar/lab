# lab — docker container configuration
# ─────────────────────────────────────
# Search order: ./ → ~/.lab/ → ~/.config/lab/
# Mounted at /home/lab/.config/lab/config.toml by docker-compose.yml.
#
# Secrets (tokens, keys, passwords) belong in .env — NOT here.

[mcp]
# Transport is set to http in the container (CMD = ["serve"]).
transport = "http"
# host / port are set via LAB_MCP_HTTP_HOST / LAB_MCP_HTTP_PORT env vars
# in docker-compose.yml — no need to repeat them here unless you want
# config-file-only deployments.
# host = "0.0.0.0"
# port = 8765

# MCP session keep-alive (seconds).  0 = use built-in default.
# session_ttl_secs = 300

[log]
# Tracing filter directive. Overridden by LAB_LOG env var.
filter = "lab=info,lab_apis=warn"
# Log output format: "text" or "json". Overridden by LAB_LOG_FORMAT env var.
format = "json"

[auth]
# Mode: "bearer" | "oauth"
#
#   bearer — set LAB_MCP_HTTP_TOKEN in .env (or docker-compose environment:).
#             Simplest option for a single-user / internal deployment.
#
#   oauth  — set LAB_PUBLIC_URL + LAB_GOOGLE_CLIENT_ID + LAB_GOOGLE_CLIENT_SECRET
#             + LAB_AUTH_ADMIN_EMAIL in .env.
#             Required for multi-user or externally-accessible deployments.
mode = "bearer"

# Optional: explicit path for the OAuth SQLite store.
# Defaults to ~/.local/share/lab/auth.db (inside the lab-data volume).
# sqlite_path = "/home/lab/.local/share/lab/auth.db"
