  securitySchemes:
    ApiKeyAuth:
      description: API Key authentication
      in: header
      name: X-API-Key
      type: apiKey
    BearerAuth:
      bearerFormat: JWT
      description: JWT Bearer token authentication
      scheme: bearer
      type: http
info:
  description: Modern Docker Management, Designed for Everyone
  title: Arcane API
  version: v1.17.1
openapi: 3.1.0
paths:
  /api-keys:
    get:
      description: Get a paginated list of API keys
      operationId: list-api-keys
      parameters:
        - description: Search query for filtering by name or description
          explode: false
          in: query
          name: search
          schema:
            description: Search query for filtering by name or description
            type: string
        - description: Column to sort by
          explode: false
          in: query
          name: sort
          schema:
            description: Column to sort by
            type: string
        - description: Sort direction (asc or desc)
          explode: false
          in: query
          name: order
          schema:
            default: asc
            description: Sort direction (asc or desc)
            type: string
        - description: Start index for pagination
          explode: false
          in: query
          name: start
          schema:
            default: 0
            description: Start index for pagination
            format: int64
            type: integer
        - description: Number of items per page
          explode: false
          in: query
          name: limit
          schema:
            default: 20
            description: Number of items per page
            format: int64
            type: integer
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiKeyPaginatedResponse"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      security:
        - BearerAuth: []
        - ApiKeyAuth: []
      summary: List API keys
      tags:
        - API Keys
    post:
      description: Create a new API key for programmatic access
      operationId: create-api-key
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ApikeyCreateApiKey"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BaseApiResponseApiKeyCreatedDto"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      security:
        - BearerAuth: []
        - ApiKeyAuth: []
      summary: Create an API key
      tags:
        - API Keys
  /api-keys/{id}:
    delete:
      description: Delete an API key by ID
      operationId: delete-api-key
      parameters:
        - description: API key ID
          in: path
          name: id
          required: true
          schema:
            description: API key ID
            type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BaseApiResponseMessageResponse"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      security:
        - BearerAuth: []
        - ApiKeyAuth: []
      summary: Delete an API key
      tags:
        - API Keys
    get:
      description: Get details of a specific API key by ID
      operationId: get-api-key
      parameters:
        - description: API key ID
          in: path
          name: id
          required: true
          schema:
            description: API key ID
            type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BaseApiResponseApiKey"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      security:
        - BearerAuth: []
        - ApiKeyAuth: []
      summary: Get an API key
      tags:
        - API Keys
    put:
      description: Update an existing API key's details
      operationId: update-api-key
      parameters:
        - description: API key ID
          in: path
          name: id
          required: true
          schema:
            description: API key ID
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ApikeyUpdateApiKey"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BaseApiResponseApiKey"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      security:
        - BearerAuth: []
        - ApiKeyAuth: []
      summary: Update an API key
      tags:
        - API Keys
  /app-images/favicon:
    get:
      description: Get the application favicon image
      operationId: get-favicon
      responses:
        "200":
          content:
            application/json:
              schema:
                contentEncoding: base64
                type: string
          description: OK
          headers:
            Cache-Control:
              schema:
                type: string
            Content-Type:
              schema:
                type: string
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: Get application favicon
      tags:
        - Application Images
  /app-images/logo:
    get:
      description: Get the application logo image
      operationId: get-logo
      parameters:
        - description: Return full logo instead of icon
          explode: false
          in: query
          name: full
          schema:
            default: false
            description: Return full logo instead of icon
            type: boolean
        - description: Optional accent color override for preview (e.g., 'oklch(0.65 0.2
            150)')
          explode: false
          in: query
          name: color
          schema:
            description: Optional accent color override for preview (e.g., 'oklch(0.65 0.2
              150)')
            type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                contentEncoding: base64
                type: string
          description: OK
          headers:
            Cache-Control:
              schema:
                type: string
            Content-Type:
              schema:
                type: string
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: Get application logo
      tags:
        - Application Images
  /app-images/logo-email:
    get:
      description: Get the application logo image in PNG format for emails
      operationId: get-logo-email
      responses:
        "200":
          content:
            application/json:
              schema:
                contentEncoding: base64
                type: string
          description: OK
          headers:
            Cache-Control:
              schema:
                type: string
            Content-Type:
              schema:
                type: string
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: Get application logo for email
      tags:
        - Application Images
  /app-images/profile:
    get:
      description: Get the default user profile image
      operationId: get-default-profile
      responses:
        "200":
          content:
            application/json:
              schema:
                contentEncoding: base64
                type: string
          description: OK
          headers:
            Cache-Control:
              schema:
                type: string
            Content-Type:
              schema:
