",\"$L1c\",null,{\"children\":\"Settings → API Keys\"}],\".\"]}],\"\\n\"]}],\"\\n\"]}],\"\\n\",[\"$\",\"li\",null,{\"children\":\"Select \\\"Create New API Key\\\"\"}],\"\\n\",[\"$\",\"li\",null,{\"children\":\"Copy the generated key and store it securely, as it will only be displayed once.\"}],\"\\n\",[\"$\",\"li\",null,{\"children\":\"Ensure the key is properly hashed and securely stored.\"}],\"\\n\"]}],\"\\n\",[\"$\",\"$L1a\",null,{\"children\":\"Use the API Key\"}],\"\\n\",[\"$\",\"$L1b\",null,{\"children\":\"Incorporate the API key into the X-API-Key header for all requests. Follow the example provided, replacing YOUR_API_KEY with your actual API key.\"}],\"\\n\",[\"$\",\"$L1b\",null,{\"children\":[[\"$\",\"$L1c\",null,{\"children\":\"Note:\"}],\" The API key is currently read-only. When write endpoints become available, you'll be able to enable write access as needed, and the existing key won't be updated automatically. A manual update will be required.\"]}],\"\\n\",[\"$\",\"$L20\",null,{\"children\":[\"$\",\"$L21\",null,{\"code\":\"curl -X GET 'https://api.ui.com/v1/hosts' \\\\\\n -H 'X-API-KEY: YOUR_API_KEY' \\\\\\n -H 'Accept: application/json'\",\"language\":\"shell\",\"maxHeight\":\"600px\"}]}],\"\\n\",[\"$\",\"$L1a\",null,{\"children\":\"Rate Limiting\"}],\"\\n\",[\"$\",\"$L1b\",null,{\"children\":\"The API rate limits are enforced based on the API version:\"}],\"\\n\",[\"$\",\"$L1f\",null,{\"children\":[\"\\n\",[\"$\",\"li\",null,{\"children\":[[\"$\",\"$L1c\",null,{\"children\":\"Early Access (EA) version\"}],\":\",\"\\n\",[\"$\",\"$L1f\",null,{\"children\":[\"\\n\",[\"$\",\"li\",null,{\"children\":\"100 requests per minute\"}],\"\\n\"]}],\"\\n\"]}],\"\\n\",[\"$\",\"li\",null,{\"children\":[[\"$\",\"$L1c\",null,{\"children\":\"v1 stable release\"}],\":\",\"\\n\",[\"$\",\"$L1f\",null,{\"children\":[\"\\n\",[\"$\",\"li\",null,{\"children\":\"10,000 requests per minute\"}],\"\\n\"]}],\"\\n\"]}],\"\\n\"]}],\"\\n\",[\"$\",\"$L1b\",null,{\"children\":[\"If y