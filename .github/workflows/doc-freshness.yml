name: Doc Freshness

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  check-docs:
    name: Check doc freshness
    runs-on: ubuntu-latest
    steps:
      # Debounce: let rapid pushes cancel before burning API credits
      - run: sleep 60

      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Fetch base branch for diff
        run: git fetch origin main --depth=1

      # Pre-compute shell outputs so Claude never needs Bash
      - name: Compute diff and doc list
        id: context
        run: |
          git diff origin/main...HEAD --name-only > /tmp/changed-files.txt
          git diff origin/main...HEAD > /tmp/pr-diff.txt
          find docs/ -name "*.md" 2>/dev/null > /tmp/all-docs.txt
          find . -name "CLAUDE.md" -not -path "*/target/*" 2>/dev/null >> /tmp/all-docs.txt
          echo "Changed files:"
          cat /tmp/changed-files.txt
          echo "Docs discovered:"
          cat /tmp/all-docs.txt

      - id: claude
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          use_sticky_comment: true
          claude_args: "--max-turns 15 --model claude-sonnet-4-6 --allowedTools Read,Glob,Grep"
          prompt: |
            You are a documentation freshness checker for the `lab` Rust project.

            The following files have already been prepared for you — do NOT run git or find commands:
            - /tmp/changed-files.txt — files changed in this PR
            - /tmp/pr-diff.txt — full unified diff of this PR
            - /tmp/all-docs.txt — all docs/*.md and CLAUDE.md files in the repo

            Your job:
            1. Read /tmp/changed-files.txt to see what changed
            2. Read /tmp/pr-diff.txt to see how it changed
            3. Read /tmp/all-docs.txt to see the available documentation files
            4. Read the docs most likely affected by the changed files
            5. For each stale doc, name the file, the section heading, and exactly what is
               now inaccurate or missing — you MUST quote the exact changed code that makes
               it stale. If you cannot quote the code, do not report the doc.

            Post ONE PR comment with your findings.
            - If docs need updating: list them with the specific inaccuracy.
            - If nothing needs updating: say "No documentation updates needed."

            Rules:
            - Only flag docs genuinely affected by this PR's changes.
            - If a referenced file does not exist, note it as a warning and continue.
            - Ignore typo-only changes, test-only changes, and internal refactors that
              do not change public contracts.
            - Do not suggest stylistic improvements — only flag factual drift.
            - Err on the side of not reporting rather than reporting uncertain findings.
              A missed real update is better than a false positive.

      - if: steps.claude.outcome == 'failure'
        run: echo "::warning::Doc freshness check failed — API key missing, rate limited, or action error. Review was not performed."
