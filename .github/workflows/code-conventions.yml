name: Code Conventions

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  check-conventions:
    name: Check code conventions
    runs-on: ubuntu-latest
    steps:
      # Debounce: let rapid pushes cancel before burning API credits
      - run: sleep 60

      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Fetch base branch for diff
        run: git fetch origin main --depth=1

      # Pre-compute shell outputs so Claude never needs Bash (prevents prompt injection)
      - name: Compute diff and CLAUDE.md list
        id: context
        run: |
          git diff origin/main...HEAD --name-only > /tmp/changed-files.txt
          git diff origin/main...HEAD > /tmp/pr-diff.txt
          find . -name "CLAUDE.md" -not -path "*/target/*" 2>/dev/null > /tmp/claude-md-files.txt
          echo "Changed files:"
          cat /tmp/changed-files.txt
          echo "CLAUDE.md files:"
          cat /tmp/claude-md-files.txt

      - id: claude
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          use_sticky_comment: true
          claude_args: "--max-turns 15 --model claude-sonnet-4-6 --allowedTools Read,Glob,Grep"
          prompt: |
            You are a code conventions checker for the `lab` Rust project.

            The following files have already been prepared for you — do NOT run git or find commands:
            - /tmp/changed-files.txt — files changed in this PR
            - /tmp/pr-diff.txt — full unified diff of this PR
            - /tmp/claude-md-files.txt — all CLAUDE.md files in the repo

            Your job: find convention violations introduced by this PR and report them
            with precision.

            Steps:
            1. Read /tmp/changed-files.txt to see what changed
            2. Read /tmp/pr-diff.txt to see the full diff
            3. Read ALL of these authoritative convention docs:
               - CLAUDE.md (root)
               - docs/CONVENTIONS.md
               - docs/OBSERVABILITY.md
               - docs/ERRORS.md
               - docs/DISPATCH.md
               - docs/SERIALIZATION.md
            4. Read /tmp/claude-md-files.txt, then read any CLAUDE.md files in directories
               adjacent to the changed files (they contain subdirectory-specific rules)
            5. For each violation, report:
               - File path
               - The exact violating line(s) quoted verbatim from the diff
               - The rule being violated (quote it from the doc)
               - What it should be instead
            6. At the end of your comment, state: "Categories checked: [list the 8 categories]
               Categories with findings: [list or 'none']"
            7. Post ONE PR comment with your findings.
               - If violations exist: list them using the format above, then the categories summary.
               - If no violations: say "No convention violations found." then the categories summary.

            CRITICAL RULES — follow these exactly:
            - ONLY flag lines that appear with a `+` prefix in the unified diff.
              Lines without a `+` prefix are not part of this PR, regardless of content.
            - EVERY finding MUST include a verbatim quote of the violating code from the
              diff. If you cannot quote the exact line, do not report it.
            - Do NOT compute or report line numbers — they are unreliable from unified diffs.
              Quote the code instead.
            - If a referenced convention doc does not exist, note it as a warning and
              continue checking with available docs.
            - Err on the side of not reporting rather than reporting uncertain findings.
              A missed real violation is better than a false positive.
            - Do NOT report clippy or rustfmt issues — CI already catches those.
            - Do NOT report pre-existing violations in unchanged code.

            Convention categories to check (in changed `+` lines only):
            1. **Layer violations** — business logic in CLI/MCP shims; reqwest/clap/rmcp/
               ratatui/anyhow/tabled in lab-apis
            2. **Module style** — mod.rs files (forbidden); use sibling foo.rs + foo/ instead
            3. **Error handling** — anyhow in lab-apis (forbidden); new error kinds not
               documented in docs/ERRORS.md
            4. **Logging** — println! for debug output (forbidden); missing dispatch events;
               secrets/tokens/auth headers in log fields
            5. **Naming** — action names not `resource.verb`; env vars not `SERVICE_SUFFIX`
            6. **Async style** — async-trait crate (forbidden); Box<dyn ServiceClient>
            7. **Feature flags** — service code not feature-gated
            8. **Serialization** — Tabled derives on lab-apis types (forbidden);
               formatting logic in lab-apis

      - if: steps.claude.outcome == 'failure'
        run: echo "::warning::Code conventions check failed — API key missing, rate limited, or action error. Review was not performed."
