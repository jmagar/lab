name: Release

on:
  push:
    tags:
      - 'v*.*.*'

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

env:
  CARGO_INCREMENTAL: "0"
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

jobs:
  frontend-assets:
    name: Frontend assets
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/build-gateway-admin
      - name: Upload gateway-admin export
        uses: actions/upload-artifact@v4
        with:
          name: gateway-admin-out
          path: apps/gateway-admin/out/
          if-no-files-found: error
          retention-days: 1

  build:
    name: Build (${{ matrix.target }})
    runs-on: ubuntu-latest
    needs: frontend-assets
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            use-cross: false
          - target: aarch64-unknown-linux-gnu
            use-cross: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: gateway-admin-out
          path: apps/gateway-admin/out
      - uses: dtolnay/rust-toolchain@1.94.1
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2

      - name: Install cross
        if: matrix.use-cross
        uses: taiki-e/install-action@cross

      - name: Build with cross
        if: matrix.use-cross
        run: cross build --workspace --all-features --release --target ${{ matrix.target }}

      - name: Build natively
        if: ${{ !matrix.use-cross }}
        run: cargo build --workspace --all-features --release --target ${{ matrix.target }}

      - name: Package
        run: |
          set -euo pipefail
          mkdir -p dist
          cp "target/${{ matrix.target }}/release/lab" "dist/lab"
          tar -C dist -czf "lab-${{ matrix.target }}.tar.gz" lab

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: lab-${{ matrix.target }}
          path: lab-${{ matrix.target }}.tar.gz
          if-no-files-found: error

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: lab-*
          merge-multiple: true
      - uses: softprops/action-gh-release@v2
        with:
          files: lab-*.tar.gz
          generate_release_notes: true
