<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Grouped Tool Calls — Mockup</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --page-bg: #0d1117;
    --surface: #161b22;
    --surface-2: #1c2128;
    --border: rgba(255,255,255,0.08);
    --border-subtle: rgba(255,255,255,0.05);
    --text-primary: #e6edf3;
    --text-muted: #7d8590;
    --text-dim: #484f58;
    --accent: #388bfd;
    --accent-dim: rgba(56,139,253,0.15);
    --success: #3fb950;
    --success-dim: rgba(63,185,80,0.12);
    --warn: #d29922;
    --warn-dim: rgba(210,153,34,0.12);
    --sky: #79c0ff;
    --sky-dim: rgba(121,192,255,0.12);
    --violet: #bc8cff;
    --hover: rgba(255,255,255,0.04);
    --radius-sm: 6px;
    --radius-md: 8px;
    --radius-lg: 12px;
  }

  body {
    background: var(--page-bg);
    color: var(--text-primary);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    font-size: 14px;
    display: flex;
    height: 100vh;
    overflow: hidden;
  }

  /* ── Controls Panel ── */
  #controls {
    width: 260px;
    flex-shrink: 0;
    background: var(--surface);
    border-right: 1px solid var(--border);
    padding: 20px 16px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 24px;
  }

  .panel-title {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text-dim);
    padding-bottom: 10px;
    border-bottom: 1px solid var(--border);
  }

  .control-group { display: flex; flex-direction: column; gap: 12px; }
  .control-group-label {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-bottom: 2px;
  }

  .control-row { display: flex; flex-direction: column; gap: 5px; }
  .control-label { font-size: 12px; color: var(--text-muted); display: flex; justify-content: space-between; }
  .control-label span { color: var(--text-primary); font-variant-numeric: tabular-nums; }

  input[type=range] {
    -webkit-appearance: none;
    width: 100%;
    height: 4px;
    background: var(--surface-2);
    border-radius: 2px;
    outline: none;
    border: 1px solid var(--border);
  }
  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 14px; height: 14px;
    border-radius: 50%;
    background: var(--accent);
    cursor: pointer;
    border: 2px solid var(--page-bg);
  }

  select {
    width: 100%;
    background: var(--surface-2);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    color: var(--text-primary);
    font-size: 12px;
    padding: 6px 8px;
    outline: none;
    cursor: pointer;
  }
  select:focus { border-color: var(--accent); }

  .toggle-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    cursor: pointer;
    padding: 4px 0;
  }
  .toggle-label { font-size: 12px; color: var(--text-muted); }
  .toggle {
    width: 32px; height: 18px;
    background: var(--surface-2);
    border: 1px solid var(--border);
    border-radius: 9px;
    position: relative;
    transition: background 0.15s;
    flex-shrink: 0;
  }
  .toggle::after {
    content: '';
    position: absolute;
    top: 2px; left: 2px;
    width: 12px; height: 12px;
    background: var(--text-dim);
    border-radius: 50%;
    transition: transform 0.15s, background 0.15s;
  }
  .toggle.on { background: var(--accent-dim); border-color: var(--accent); }
  .toggle.on::after { transform: translateX(14px); background: var(--accent); }

  .preset-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
  .preset-btn {
    background: var(--surface-2);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    color: var(--text-muted);
    font-size: 11px;
    padding: 6px 8px;
    cursor: pointer;
    text-align: center;
    transition: all 0.1s;
  }
  .preset-btn:hover { border-color: var(--accent); color: var(--text-primary); }
  .preset-btn.active { border-color: var(--accent); color: var(--accent); background: var(--accent-dim); }

  /* ── Right Column ── */
  #right {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── Preview ── */
  #preview-wrap {
    flex: 1;
    overflow-y: auto;
    padding: 32px;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    background: var(--page-bg);
  }

  .chat-panel {
    width: 100%;
    max-width: 680px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    overflow: hidden;
  }

  .chat-panel-header {
    padding: 10px 16px;
    border-bottom: 1px solid var(--border);
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text-dim);
  }

  .tool-list { padding: 8px 12px 12px; display: flex; flex-direction: column; }

  /* ── Individual tool call row ── */
  .tool-row {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    padding: 7px 6px;
    border-radius: var(--radius-sm);
    cursor: pointer;
    position: relative;
    transition: background 0.1s;
  }
  .tool-row:hover { background: var(--hover); }

  .tool-row .vline {
    position: absolute;
    left: 14px; top: 0; bottom: 0;
    width: 1px;
    background: var(--border);
    z-index: 0;
  }

  .tool-icon-wrap {
    position: relative;
    z-index: 1;
    width: 20px; height: 20px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    margin-top: 1px;
    background: var(--surface);
    border-radius: 50%;
  }

  .tool-icon {
    width: 16px; height: 16px;
    fill: none;
    stroke-width: 1.5;
    stroke-linecap: round;
    stroke-linejoin: round;
  }

  .tool-content { flex: 1; min-width: 0; }
  .tool-label {
    font-size: 13px;
    line-height: 1.4;
    color: var(--text-primary);
  }
  .tool-sublabel {
    font-size: 11px;
    color: var(--text-muted);
    margin-top: 1px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .tool-right {
    display: flex; align-items: center; gap: 6px;
    flex-shrink: 0;
    margin-top: 2px;
  }

  .status-icon { width: 14px; height: 14px; flex-shrink: 0; }

  .chevron {
    width: 13px; height: 13px;
    stroke: var(--text-dim);
    stroke-width: 2;
    fill: none;
    stroke-linecap: round;
    stroke-linejoin: round;
    transition: transform 0.15s;
    flex-shrink: 0;
  }
  .chevron.open { transform: rotate(90deg); }

  /* ── Group row ── */
  .group-row {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    padding: 7px 6px;
    border-radius: var(--radius-sm);
    cursor: pointer;
    transition: background 0.1s;
  }
  .group-row:hover { background: var(--hover); }

  .group-badge {
    display: inline-flex;
    align-items: center;
    background: var(--surface-2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 1px 7px;
    font-size: 10px;
    font-weight: 600;
    color: var(--text-muted);
    margin-left: 6px;
    vertical-align: middle;
    letter-spacing: 0.02em;
  }

  /* ── Expanded children ── */
  .group-children {
    overflow: hidden;
    transition: max-height 0.2s ease;
  }
  .group-children.collapsed { max-height: 0; }
  .group-children.expanded { max-height: 600px; }

  .child-item { border-radius: var(--radius-sm); overflow: hidden; }
  .child-row {
    display: flex;
    align-items: flex-start;
    gap: 8px;
    padding: 5px 6px 5px 36px;
    border-radius: var(--radius-sm);
    cursor: pointer;
    transition: background 0.1s;
  }
  .child-row:hover { background: var(--hover); }
  .child-label { font-size: 12px; color: var(--text-primary); line-height: 1.4; flex: 1; min-width: 0; }
  .child-sublabel { font-size: 10px; color: var(--text-muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

  .child-detail {
    overflow: hidden;
    transition: max-height 0.2s ease;
  }
  .child-detail.collapsed { max-height: 0; }
  .child-detail.expanded { max-height: 400px; }

  .child-io {
    margin: 2px 6px 6px 36px;
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    background: var(--surface-2);
    overflow: hidden;
  }
  .child-io-section { padding: 8px 10px; }
  .child-io-section + .child-io-section { border-top: 1px solid var(--border); }
  .child-io-label {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-bottom: 5px;
  }
  .child-io-label.output { color: var(--success); }
  .child-io pre {
    font-family: ui-monospace, 'SF Mono', monospace;
    font-size: 10px;
    line-height: 1.55;
    color: var(--text-primary);
    white-space: pre-wrap;
    overflow-x: auto;
  }

  /* ── Count chips style (alternative) ── */
  .name-chips {
    display: flex;
    gap: 4px;
    flex-wrap: wrap;
    margin-top: 3px;
  }
  .name-chip {
    font-size: 10px;
    color: var(--text-muted);
    background: var(--surface-2);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 1px 5px;
  }

  /* ── Divider between groups ── */
  .group-divider {
    height: 1px;
    background: var(--border-subtle);
    margin: 3px 6px;
  }

  /* ── Prompt output ── */
  #prompt-wrap {
    border-top: 1px solid var(--border);
    background: var(--surface);
    padding: 14px 20px;
    display: flex;
    align-items: flex-start;
    gap: 12px;
    min-height: 80px;
    max-height: 140px;
  }

  #prompt-text {
    flex: 1;
    font-family: ui-monospace, 'SF Mono', monospace;
    font-size: 11.5px;
    line-height: 1.6;
    color: var(--text-muted);
    overflow-y: auto;
  }

  #copy-btn {
    flex-shrink: 0;
    background: var(--surface-2);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    color: var(--text-muted);
    font-size: 11px;
    padding: 5px 10px;
    cursor: pointer;
    transition: all 0.1s;
    white-space: nowrap;
  }
  #copy-btn:hover { border-color: var(--accent); color: var(--text-primary); }
  #copy-btn.copied { border-color: var(--success); color: var(--success); }
</style>
</head>
<body>

<!-- ── Controls ── -->
<div id="controls">
  <div class="panel-title">Grouped Tool Calls</div>

  <div class="control-group">
    <div class="control-group-label">Presets</div>
    <div class="preset-grid">
      <button class="preset-btn active" onclick="applyPreset('minimal')">Minimal</button>
      <button class="preset-btn" onclick="applyPreset('chips')">Name Chips</button>
      <button class="preset-btn" onclick="applyPreset('dividers')">Dividers</button>
      <button class="preset-btn" onclick="applyPreset('verbose')">Verbose</button>
    </div>
  </div>

  <div class="control-group">
    <div class="control-group-label">Grouping</div>

    <div class="control-row">
      <div class="control-label">Min items to group <span id="threshold-val">2</span></div>
      <input type="range" id="threshold" min="2" max="4" value="2" oninput="onControl('threshold', this.value)">
    </div>

    <div class="control-row">
      <div class="control-label">Group strategy</div>
      <select id="strategy" onchange="onControl('strategy', this.value)">
        <option value="consecutive">Consecutive same-category</option>
        <option value="all">All same-category</option>
      </select>
    </div>
  </div>

  <div class="control-group">
    <div class="control-group-label">Group Header</div>

    <div class="control-row">
      <div class="control-label">Label style</div>
      <select id="labelStyle" onchange="onControl('labelStyle', this.value)">
        <option value="verb">Read 3 files / Searched 7 dirs</option>
        <option value="count">3 reads · 7 searches</option>
        <option value="icon-only">Icon + count badge only</option>
      </select>
    </div>

    <label class="toggle-row" onclick="toggleState('showNameChips')">
      <span class="toggle-label">Show name chips when collapsed</span>
      <div class="toggle" id="toggle-showNameChips"></div>
    </label>

    <label class="toggle-row" onclick="toggleState('showDividers')">
      <span class="toggle-label">Dividers between groups</span>
      <div class="toggle" id="toggle-showDividers"></div>
    </label>
  </div>

  <div class="control-group">
    <div class="control-group-label">Children (when expanded)</div>

    <label class="toggle-row" onclick="toggleState('childChevrons')">
      <span class="toggle-label">Individual expand arrows</span>
      <div class="toggle" id="toggle-childChevrons"></div>
    </label>

    <label class="toggle-row" onclick="toggleState('childPaths')">
      <span class="toggle-label">Show paths on children</span>
      <div class="toggle" id="toggle-childPaths"></div>
    </label>
  </div>
</div>

<!-- ── Right ── -->
<div id="right">
  <div id="preview-wrap">
    <div class="chat-panel">
      <div class="chat-panel-header">Agent Actions</div>
      <div class="tool-list" id="tool-list"></div>
    </div>
  </div>

  <div id="prompt-wrap">
    <div id="prompt-text"></div>
    <button id="copy-btn" onclick="copyPrompt()">Copy prompt</button>
  </div>
</div>

<script>
// ── SVG icons ──
const ICONS = {
  skill: `<svg class="tool-icon" viewBox="0 0 24 24"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>`,
  tool: `<svg class="tool-icon" viewBox="0 0 24 24"><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/></svg>`,
  read: `<svg class="tool-icon" viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14,2 14,8 20,8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10,9 9,9 8,9"/></svg>`,
  search: `<svg class="tool-icon" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>`,
  chevron_right: `<svg class="chevron" viewBox="0 0 24 24"><polyline points="9,18 15,12 9,6"/></svg>`,
  chevron_right_open: `<svg class="chevron open" viewBox="0 0 24 24"><polyline points="9,18 15,12 9,6"/></svg>`,
  check: `<svg class="status-icon" viewBox="0 0 24 24" fill="none" stroke="#3fb950" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22,4 12,14.01 9,11.01"/></svg>`,
};

const ICON_COLORS = {
  skill: '#79c0ff',
  tool: '#d29922',
  read: '#58a6ff',
  search: '#56d364',
};

// ── Data ──
const TOOL_CALLS = [
  { id: 1, category: 'skill', label: 'using-superpowers', path: null },
  { id: 2, category: 'tool', label: 'Update topic to: "Initial Repository Exploration"', path: null },
  { id: 3, category: 'read', label: 'Reading CLAUDE.md', path: '/workspace/lab/CLAUDE.md' },
  { id: 4, category: 'read', label: 'Reading README.md', path: '/workspace/lab/README.md' },
  { id: 5, category: 'read', label: 'Reading ARCH.md', path: '/workspace/lab/docs/ARCH.md' },
  { id: 6, category: 'search', label: 'crates', path: null },
  { id: 7, category: 'search', label: 'plugins', path: null },
  { id: 8, category: 'search', label: 'apps/gateway-admin', path: null },
  { id: 9, category: 'search', label: 'plugins/lab', path: null },
  { id: 10, category: 'search', label: 'crates/lab-apis/src', path: null },
  { id: 11, category: 'search', label: 'crates/lab/src', path: null },
  { id: 12, category: 'search', label: 'crates/lab/src/dispatch', path: null },
];

// ── State ──
const DEFAULTS = {
  threshold: 2,
  strategy: 'consecutive',
  labelStyle: 'verb',
  showNameChips: false,
  showDividers: false,
  childChevrons: false,
  childPaths: true,
};
const state = { ...DEFAULTS };
const expandedGroups = new Set();
const expandedChildren = new Set();

// ── Grouping logic ──
function groupItems(items, threshold, strategy) {
  const result = [];
  let i = 0;
  while (i < items.length) {
    if (strategy === 'consecutive') {
      // Find run of same category
      let j = i + 1;
      while (j < items.length && items[j].category === items[i].category) j++;
      const run = items.slice(i, j);
      if (run.length >= threshold) {
        result.push({ type: 'group', category: items[i].category, items: run });
      } else {
        run.forEach(item => result.push({ type: 'single', item }));
      }
      i = j;
    } else {
      result.push({ type: 'single', item: items[i] });
      i++;
    }
  }
  return result;
}

// ── Label builders ──
function groupLabel(group) {
  const n = group.items.length;
  const cat = group.category;
  if (state.labelStyle === 'verb') {
    if (cat === 'read') return `Read ${n} files`;
    if (cat === 'search') return `Searched ${n} ${n === 1 ? 'directory' : 'directories'}`;
    if (cat === 'skill') return `Loaded ${n} skills`;
    return `${n} actions`;
  }
  if (state.labelStyle === 'count') {
    if (cat === 'read') return `${n} file ${n === 1 ? 'read' : 'reads'}`;
    if (cat === 'search') return `${n} ${n === 1 ? 'search' : 'searches'}`;
    return `${n} ${cat}`;
  }
  // icon-only — empty label (badge handles it)
  return '';
}

// ── Render ──
function renderPreview() {
  const list = document.getElementById('tool-list');
  const groups = groupItems(TOOL_CALLS, Number(state.threshold), state.strategy);
  let html = '';
  let lastCat = null;

  groups.forEach((entry, gi) => {
    const isGroup = entry.type === 'group';

    if (state.showDividers && lastCat && (isGroup ? entry.category : entry.item.category) !== lastCat) {
      html += `<div class="group-divider"></div>`;
    }
    lastCat = isGroup ? entry.category : entry.item.category;

    if (!isGroup) {
      const item = entry.item;
      const color = ICON_COLORS[item.category] || '#7d8590';
      html += `
        <div class="tool-row">
          <div class="vline"></div>
          <div class="tool-icon-wrap">${ICONS[item.category] ? ICONS[item.category].replace('class="tool-icon"', `class="tool-icon" stroke="${color}"`) : ''}</div>
          <div class="tool-content">
            <div class="tool-label">${item.label}</div>
            ${item.path ? `<div class="tool-sublabel">${item.path}</div>` : ''}
          </div>
          <div class="tool-right">
            ${ICONS.check}
            ${ICONS.chevron_right}
          </div>
        </div>`;
    } else {
      const gid = `g-${gi}`;
      const isOpen = expandedGroups.has(gid);
      const color = ICON_COLORS[entry.category] || '#7d8590';
      const label = groupLabel(entry);
      const iconHtml = ICONS[entry.category]
        ? ICONS[entry.category].replace('class="tool-icon"', `class="tool-icon" stroke="${color}"`)
        : '';
      const badgeHtml = `<span class="group-badge">${entry.items.length}</span>`;
      const chipsHtml = state.showNameChips && !isOpen
        ? `<div class="name-chips">${entry.items.slice(0, 4).map(it => `<span class="name-chip">${it.label.replace(/^(Reading|Searching) /, '')}</span>`).join('')}${entry.items.length > 4 ? `<span class="name-chip">+${entry.items.length - 4}</span>` : ''}</div>`
        : '';

      // Children
      let childrenHtml = '';
      entry.items.forEach(child => {
        const cid = `c-${child.id}`;
        const childOpen = expandedChildren.has(cid);
        const mockInput = child.path
          ? `{ "path": "${child.path}" }`
          : `{ "name": "${child.label}" }`;
        const mockOutput = child.path
          ? `{ "title": "${child.label.replace('Reading ', '')}", "kind": "read", "status": "completed",\n  "locations": ["${child.path}"] }`
          : `{ "kind": "search", "status": "completed",\n  "results": ["${child.label}/", "${child.label}/src/", "${child.label}/tests/"] }`;
        childrenHtml += `
          <div class="child-item">
            <div class="child-row" onclick="toggleChild('${cid}', event)">
              <div class="tool-icon-wrap" style="width:16px;height:16px;flex-shrink:0;">${iconHtml}</div>
              <div class="tool-content">
                <div class="child-label">${child.label}</div>
                ${state.childPaths && child.path ? `<div class="child-sublabel">${child.path}</div>` : ''}
              </div>
              <div class="tool-right">
                ${ICONS.check}
                <svg class="chevron ${childOpen ? 'open' : ''}" viewBox="0 0 24 24"><polyline points="9,18 15,12 9,6"/></svg>
              </div>
            </div>
            <div class="child-detail ${childOpen ? 'expanded' : 'collapsed'}" id="${cid}-detail">
              <div class="child-io">
                <div class="child-io-section">
                  <div class="child-io-label">Input</div>
                  <pre>${mockInput}</pre>
                </div>
                <div class="child-io-section">
                  <div class="child-io-label output">Output</div>
                  <pre>${mockOutput}</pre>
                </div>
              </div>
            </div>
          </div>`;
      });

      html += `
        <div class="group-row" onclick="toggleGroup('${gid}', event)">
          <div class="tool-icon-wrap">${iconHtml}</div>
          <div class="tool-content">
            <div class="tool-label">${state.labelStyle === 'icon-only' ? '' : label}${badgeHtml}</div>
            ${chipsHtml}
          </div>
          <div class="tool-right">
            ${ICONS.check}
            <svg class="chevron ${isOpen ? 'open' : ''}" viewBox="0 0 24 24"><polyline points="9,18 15,12 9,6"/></svg>
          </div>
        </div>
        <div class="group-children ${isOpen ? 'expanded' : 'collapsed'}" id="${gid}-children">
          ${childrenHtml}
        </div>`;
    }
  });

  list.innerHTML = html;
}

function toggleGroup(gid, e) {
  if (expandedGroups.has(gid)) expandedGroups.delete(gid);
  else expandedGroups.add(gid);
  renderAll();
}

function toggleChild(cid, e) {
  e.stopPropagation();
  if (expandedChildren.has(cid)) expandedChildren.delete(cid);
  else expandedChildren.add(cid);
  renderAll();
}

// ── Prompt ──
function updatePrompt() {
  const parts = [];
  const threshold = Number(state.threshold);

  parts.push(`Group consecutive tool calls of the same category when there are ${threshold} or more in a row.`);

  if (state.labelStyle === 'verb') parts.push(`Use verb-form group labels: "Read N files", "Searched N directories".`);
  else if (state.labelStyle === 'count') parts.push(`Use count-form group labels: "N reads", "N searches".`);
  else parts.push(`Show only the icon and a count badge — no text label on the group row.`);

  if (state.showNameChips) parts.push(`When collapsed, show name chips under the group header (up to 4, then "+N more").`);
  if (state.showDividers) parts.push(`Add a subtle divider between different category groups.`);
  if (state.childChevrons) parts.push(`Individual items inside the group each have their own expand chevron.`);
  else parts.push(`Individual items inside the group have no secondary expand arrow — clicking the child row opens the outer collapsible.`);
  if (!state.childPaths) parts.push(`Omit file paths on child rows (only show the label).`);

  document.getElementById('prompt-text').textContent = parts.join(' ');
}

function renderAll() { renderPreview(); updatePrompt(); }

// ── Controls ──
function onControl(key, value) {
  state[key] = value;
  if (key === 'threshold') document.getElementById('threshold-val').textContent = value;
  updateActivePreset();
  renderAll();
}

function toggleState(key) {
  state[key] = !state[key];
  document.getElementById(`toggle-${key}`).className = 'toggle' + (state[key] ? ' on' : '');
  updateActivePreset();
  renderAll();
}

// ── Presets ──
const PRESETS = {
  minimal: { threshold: 2, strategy: 'consecutive', labelStyle: 'verb', showNameChips: false, showDividers: false, childChevrons: false, childPaths: true },
  chips: { threshold: 2, strategy: 'consecutive', labelStyle: 'verb', showNameChips: true, showDividers: false, childChevrons: false, childPaths: true },
  dividers: { threshold: 2, strategy: 'consecutive', labelStyle: 'verb', showNameChips: false, showDividers: true, childChevrons: true, childPaths: true },
  verbose: { threshold: 3, strategy: 'consecutive', labelStyle: 'count', showNameChips: true, showDividers: true, childChevrons: true, childPaths: false },
};

function applyPreset(name) {
  const p = PRESETS[name];
  Object.assign(state, p);
  // Sync UI
  document.getElementById('threshold').value = state.threshold;
  document.getElementById('threshold-val').textContent = state.threshold;
  document.getElementById('strategy').value = state.strategy;
  document.getElementById('labelStyle').value = state.labelStyle;
  for (const key of ['showNameChips', 'showDividers', 'childChevrons', 'childPaths']) {
    document.getElementById(`toggle-${key}`).className = 'toggle' + (state[key] ? ' on' : '');
  }
  document.querySelectorAll('.preset-btn').forEach(b => b.classList.toggle('active', b.textContent.toLowerCase().replace(' ', '') === name.toLowerCase().replace(' ', '')));
  renderAll();
}

function updateActivePreset() {
  document.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('active'));
}

// ── Copy ──
function copyPrompt() {
  navigator.clipboard.writeText(document.getElementById('prompt-text').textContent).then(() => {
    const btn = document.getElementById('copy-btn');
    btn.textContent = 'Copied!';
    btn.className = 'copied';
    // reset
    document.getElementById('copy-btn').textContent = 'Copied!';
    setTimeout(() => { btn.textContent = 'Copy prompt'; btn.className = ''; }, 1500);
  });
}

// ── Init ──
// Expand first group by default so initial state shows something
expandedGroups.add('g-2');
applyPreset('minimal');
</script>
</body>
