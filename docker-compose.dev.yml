# Dev override — mounts the local binary directly so rebuilds don't require
# a Docker image rebuild. After `just dev` or `just dev-debug`, a container
# restart picks up the new binary immediately.
#
# First-time start:
#   just dev-up
#
# Normal iteration (release build):
#   just dev
#
# Fast iteration (debug build, ~3x faster compile, no optimizations):
#   just dev-debug
#
# ACP runtime smoke check after a restart:
#   just acp-smoke --provider-only
#   just acp-smoke
services:
  labby-master:
    volumes:
      - ./bin/labby:/usr/local/bin/labby
    environment:
      # Serve frontend assets from the bind-mounted workspace so `pnpm build`
      # changes are reflected immediately without a binary rebuild.
      LAB_WEB_ASSETS_DIR: "/workspace/lab/apps/gateway-admin/out"
