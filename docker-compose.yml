services:
  lab-master:
    image: lab:dev
    hostname: dookie
    build:
      context: .
      dockerfile: config/Dockerfile.fast
    restart: unless-stopped

    ports:
      # LAB_HOST_PORT lets you remap the host-side port without editing this file.
      - "${LAB_HOST_PORT:-8765}:8765"

    volumes:
      # Named volume — persists SQLite DBs, master.lock, OAuth keys across
      # container restarts and image rebuilds.
      - lab-data:/home/lab/.local
      # Host config file mounted read-only. Keep runtime config in ~/.lab so
      # Docker and local `lab serve` use the same auth/service settings.
      - ${HOME}/.lab/config.toml:/home/lab/.config/lab/config.toml:ro

    environment:
      # Bind to all container interfaces so the port mapping works.
      # The host-side port mapping (above) controls external exposure.
      LAB_MCP_HTTP_HOST: "0.0.0.0"
      LAB_MCP_HTTP_PORT: "8765"
      # Override host-only paths from ~/.lab/.env for the container filesystem.
      LAB_WEB_ASSETS_DIR: ""
      LAB_LOCAL_LOGS_STORE_PATH: "/home/lab/.local/share/lab/logs.db"
      # Structured log levels — RUST_LOG for tracing, LAB_LOG for app filter.
      RUST_LOG: "lab=info,warn"
      LAB_LOG: "info"

    # Load host runtime secrets from ~/.lab so Docker and local `lab serve`
    # use the same auth, OAuth, and service credentials.
    env_file:
      - path: ${HOME}/.lab/.env
        required: false

    # ── Hard outer boundary ──────────────────────────────────────────────────
    # Even if the spawn-guard logic in the binary fails, the container's pid
    # namespace + these limits prevent a fork-bomb from reaching the host.
    deploy:
      resources:
        limits:
          memory: 2G
          pids: 200

volumes:
  lab-data:
    driver: local
