[advisories]
unmaintained = "all"
yanked = "deny"
ignore = [
    # rand: unsound when log+thread_rng features are used with a custom logger (no patch yet)
    "RUSTSEC-2026-0097",
    # rsa/rsa-der-parser: timing side-channel in RSA (no patch available upstream)
    "RUSTSEC-2023-0071",
    # webpki: URI name constraints ignored (no API impact for our usage)
    "RUSTSEC-2026-0098",
    # webpki: wildcard name constraint bypass (no API impact for our usage)
    "RUSTSEC-2026-0099",
]

[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Zlib",
    "OpenSSL",
    "BSL-1.0",
    "CC0-1.0",
    "MPL-2.0",
    "CDLA-Permissive-2.0",
]

[bans]
multiple-versions = "warn"
wildcards = "allow"

[sources]
unknown-registry = "deny"
unknown-git = "warn"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
